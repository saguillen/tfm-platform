name: Build and Push Backstage Image to ACR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/backstage/**'
      - '.github/workflows/backstage-build.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/backstage/**'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: tfmplatformacr.azurecr.io
  IMAGE_NAME: backstage
  DOCKERFILE_PATH: src/backstage/Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: 'src/backstage/yarn.lock'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          else
            TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH_NAME},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH_NAME}-${SHORT_SHA}"
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./src/backstage
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tags }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Trigger GitOps deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "✅ Backstage image successfully pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "ArgoCD will automatically sync the new image"

