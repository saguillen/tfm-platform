name: Deploy with GitOps

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Build and Push to ACR"]
    types: [completed]

env:
  REGISTRY_LOGIN_SERVER: tfmplatformacr.azurecr.io
  IMAGE_NAME: tfm-platform-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/tfm-gitops
          token: ${{ secrets.GITHUB_TOKEN }}
          path: gitops-repo

      - name: Update image in kustomization
        run: |
          cd gitops-repo/kubernetes/overlays/prod
          
          # Actualizar imagen
          kustomize edit set image \
            tfm-platform-api=${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Commit and push changes
        run: |
          cd gitops-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          
          git add kubernetes/overlays/prod/kustomization.yaml
          git commit -m "chore: bump image to ${{ github.sha }}" || true
          git push

      - name: Trigger ArgoCD sync
        run: |
          echo "GitOps deployment pushed. ArgoCD will sync automatically based on configured sync policy."
          echo "Image: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
